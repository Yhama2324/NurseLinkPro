<!DOCTYPE html>
<html>
<head><title>Test Curriculum API</title></head>
<body>
<h1>Curriculum API Test</h1>
<button onclick="testAPI()">Test Curriculum API</button>
<pre id="output"></pre>
<script>
async function testAPI() {
  const output = document.getElementById('output');
  try {
    const res = await fetch('/api/curriculum/subjects', {
      credentials: 'include'
    });
    output.textContent = `Status: ${res.status}\n`;
    if (res.ok) {
      const data = await res.json();
      output.textContent += `Success! Got ${data.length} subjects\n`;
      output.textContent += JSON.stringify(data[0], null, 2);
    } else {
      output.textContent += await res.text();
    }
  } catch (error) {
    output.textContent = 'Error: ' + error.message;
  }
}
</script>
</body>
</html>
